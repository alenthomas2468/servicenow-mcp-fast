# Deployment stack for a single EC2 instance (free tier friendly).
#
# Services:
#   mcp   - the ServiceNow MCP server (Streamable HTTP on port 8080, internal only)
#   caddy - reverse proxy that terminates HTTPS with an automatic free
#           Let's Encrypt certificate and forwards to the MCP server
#
# Usage on the EC2 instance:
#   1. Put your ServiceNow credentials in .env next to this file (see ../.env.example)
#   2. Set DOMAIN in .env to your DNS name (e.g. mymcp.duckdns.org)
#   3. docker compose up -d

services:
  mcp:
    build: ..
    restart: unless-stopped
    env_file: .env
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      PORT: 8080
    expose:
      - "8080"
    # OAuth state (dynamic client registrations, encrypted upstream tokens)
    # lives in fastmcp's data dir; persist it so users don't have to sign in
    # to ServiceNow again after every rebuild/recreate.
    volumes:
      - mcp_oauth_state:/home/mcp/.local/share/fastmcp
    # BLOCKER overcome: t2.micro/t3.micro free-tier instances have only 1 GB
    # RAM, and `docker compose up --build` OOM-killed mid-build the first time
    # this was tried on a fresh instance with no swap. Fixed by adding 2 GB of
    # swap on the host (see docs/DEPLOYMENT_EC2.md) and bounding
    # the running container so it can't eat the whole box afterward.
    deploy:
      resources:
        limits:
          memory: 512m

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mcp

volumes:
  caddy_data:
  caddy_config:
  mcp_oauth_state:
